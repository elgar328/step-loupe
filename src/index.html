<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<!-- Tint the mobile browser chrome (address/status bar) to match the dark 3D view
     that sits at the top of the page on small screens. -->
<meta name="theme-color" content="#1e1e1e" />
<title>step-loupe — STEP viewer</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/themes/light.css" />
<style>
  * { box-sizing: border-box; }
  /* Dark page backdrop: fills overscroll gutters and gives iOS Safari a dark
     surface to tint the toolbar from (paired with the theme-color meta). */
  html, body { margin: 0; height: 100%; font: 13px/1.4 system-ui, sans-serif; background: #1e1e1e; }
  #app { display: flex; height: 100vh; height: 100dvh; }
  #side {
    width: 340px; min-width: 240px; max-width: 60vw;
    display: flex; flex-direction: column;
    background: #fafafa;   /* light/dark contrast defines the edge; no border line */
  }
  #side-scroll { flex: 1 1 auto; overflow: auto; padding: 0 8px 8px; }
  /* pinned detail (inspector) pane at the bottom of the sidebar */
  #detail {
    flex: none; max-height: 42%; overflow: auto;
    border-top: 1px solid #10131a; padding: 6px 8px 8px;
    background: #22272e; color: #d0d5da;   /* dark inspector, echoes the 3D view */
  }
  #view { flex: 1; position: relative; overflow: hidden; }
  #view canvas { display: block; width: 100% !important; height: 100% !important; }
  #drop {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; color: #888; pointer-events: none;
    font-size: 15px; text-align: center;
  }
  pre { white-space: pre-wrap; word-break: break-all; margin: 4px 0; font-size: 11px; color: #333; }
  .drop-hi { outline: 3px dashed #4a90e2; outline-offset: -6px; }

  /* file control */
  #filebar { display: flex; align-items: center; gap: 8px; flex: none; padding: 8px 8px 6px; }
  #openbtn { flex: none; }               /* never shrink or wrap the button */
  #fname {
    flex: 1 1 auto; min-width: 0;         /* take remaining width, allow shrink */
    font-size: 11.5px; color: #6b7280;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* ---- tree (native <details>/<summary>) — one design language for scene +
     report + header. Typography scale is fixed via variables. ---- */
  :root {
    --fs-row: 12.5px;    /* node label */
    --fs-meta: 11px;     /* key/value meta lines */
    --fs-group: 11.5px;  /* uppercase group headers */
    --fs-id: 11px;       /* entity #id tag */
    --indent: 14px;      /* per-depth indentation + chevron slot width */
    --row-hover: #eef2f7;
    --row-sel: #dbeafe;
  }
  details { margin: 0; }
  summary { list-style: none; }
  summary::-webkit-details-marker { display: none; }

  /* a single row (summary for parents, div for leaves) */
  .row {
    display: flex; align-items: flex-start; gap: 0;
    padding: 2px 4px; border-radius: 4px; cursor: pointer;
    font-size: var(--fs-row); line-height: 1.45; color: #24292f;
    user-select: none;
  }
  .row:hover { background: var(--row-hover); }
  .row.sel { background: var(--row-sel); }
  /* read-only info rows (report/header) don't act selectable */
  .row.info { cursor: default; }
  .row.info:hover { background: var(--row-hover); }  /* still give hover feedback */

  /* chevron: a CSS triangle in a fixed-width slot; leaves reserve the slot */
  .chev {
    flex: none; width: var(--indent); height: calc(var(--fs-row) * 1.45);
    display: inline-flex; align-items: center; justify-content: center;
    color: #8a9099; transition: transform .12s ease;
  }
  .chev::before { content: ''; border: 4px solid transparent; border-left-color: currentColor; border-right: 0; margin-left: 1px; }
  details[open] > summary > .chev { transform: rotate(90deg); }
  .chev.leaf::before { content: none; }  /* leaves: empty slot, keeps alignment */

  /* the stacked content: title line + meta lines */
  .node-content { display: flex; flex-direction: column; min-width: 0; flex: 1; }
  .node-title { display: flex; align-items: center; min-width: 0; }
  /* a tall thin color bar (not a square) — same kinds stacked read as one
     continuous vertical band, broken only between rows; sits near the label. */
  .dot {
    flex: none; display: inline-block;
    width: 3px; height: calc(var(--fs-row) * 1.3); border-radius: 1px;
    margin: 0 5px 0 3px; background: #b0b6bd;
  }
  .label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .idtag { color: #9aa0a6; font-size: var(--fs-id); margin-left: 6px; font-variant-numeric: tabular-nums; }
  .metaline { font-size: var(--fs-meta); line-height: 1.4; }
  .mk { color: #8b949e; margin-right: 4px; }
  .mv { color: #24292f; word-break: break-word; }
  .mv.empty { color: #b0b6bd; }

  /* group header rows (canonical top-level categories) */
  .row.group > .node-content > .node-title > .label {
    font-weight: 600; text-transform: uppercase; letter-spacing: .03em;
    font-size: var(--fs-group); color: #57606a;
  }
  .row.group .dot { display: none; }
  .row.group.empty { cursor: default; }
  .row.group.empty > .node-content > .node-title > .label { color: #b0b6bd; }
  .none { color: #b0b6bd; font-size: 10.5px; margin-left: 6px; }

  /* report/header structural rows: bold root, muted sub-group */
  .row.meta-root > .node-content > .node-title > .label { font-weight: 600; }
  .row.meta-sub > .node-content > .node-title > .label { color: #6b7280; font-size: 12px; }
  .row.meta-sub.empty { cursor: default; }
  .row.meta-sub.empty > .node-content > .node-title > .label { color: #b0b6bd; }
  .row.meta-root .dot, .row.meta-sub .dot, .row.kv .dot { display: none; }

  /* per-kind dot palette (type legend) */
  .k-Feature .dot { background: #d29922; }
  .k-Part .dot { background: #8957e5; }
  .k-Component .dot { background: #bf3989; }
  .k-Solid .dot { background: #e5534b; }
  .k-Face .dot { background: #c9992a; }
  .k-Bound .dot { background: #8250df; }
  .k-Edge .dot { background: #2188ff; }
  .k-Vertex .dot { background: #1a7f37; }
  .k-Product .dot { background: #bf3989; }
  .k-Dimension .dot { background: #0969da; }
  .k-Tolerance .dot { background: #bc4c00; }
  .k-Datum .dot { background: #159588; }
  .k-Mesh .dot { background: #57606a; }

  /* ---- detail (inspector) pane ---- */
  .detail-title {
    display: flex; align-items: center; gap: 6px; margin-bottom: 4px;
    font-size: var(--fs-row); font-weight: 600; color: #e6edf3;
  }
  .detail-title .kind { font-weight: 400; color: #909aa4; font-size: var(--fs-id); }
  .detail-title .idtag { margin-left: auto; color: #7d8590; }
  .detail-empty { color: #7d8590; font-size: var(--fs-meta); font-style: italic; padding: 4px 0; }
  .detail-row { display: flex; gap: 6px; font-size: var(--fs-meta); line-height: 1.5; }
  .detail-row .mk { flex: none; min-width: 84px; color: #909aa4; }
  .detail-row .mv { color: #d0d5da; word-break: break-word; }
  .detail-row .mv.empty { color: #6b7280; }
  .swatch {
    display: inline-block; width: 10px; height: 10px; border-radius: 2px;
    border: 1px solid #ffffff33; margin-right: 4px; vertical-align: -1px;
  }

  /* ---- mobile: stack the 3D view over the panel (top/bottom split) ---- */
  @media (max-width: 640px) {
    #app { flex-direction: column; }
    #view { order: -1; flex: none; height: 50dvh; }   /* 3D on top, ~half the screen */
    #side { width: 100%; min-width: 0; max-width: none; flex: 1 1 auto; min-height: 0; }
    #side-scroll { min-height: 0; overscroll-behavior: contain; } /* scroll in-panel, no page bleed */
    #detail { max-height: 40%; }                        /* inspector share of the bottom half */
    .row { padding: 5px 4px; }                          /* larger touch targets */
  }
</style>
</head>
<body>
<div id="app">
  <div id="side">
    <div id="filebar">
      <input type="file" id="file" accept=".step,.stp" hidden />
      <sl-button id="openbtn" size="small" variant="primary">Open STEP file</sl-button>
      <span id="fname">No file loaded</span>
    </div>
    <div id="side-scroll">
      <div id="report"></div>
      <div id="header"></div>
      <div id="units"></div>
      <div id="tree"></div>
    </div>
    <div id="detail"><div class="detail-empty">Select an item to see details</div></div>
  </div>
  <div id="view">
    <div id="drop">Drop a STEP file here</div>
  </div>
</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { Line2 } from 'three/addons/lines/Line2.js';
import { LineGeometry } from 'three/addons/lines/LineGeometry.js';
import { LineMaterial } from 'three/addons/lines/LineMaterial.js';
import 'https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/components/button/button.js';
import init, { load_step } from './pkg/step_loupe.js';

await init();

// ---- three.js scene ----
const view = document.getElementById('view');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(devicePixelRatio);
view.appendChild(renderer.domElement);
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1e1e1e);
const camera = new THREE.PerspectiveCamera(50, 1, 0.001, 1e7);
camera.position.set(1, 1, 1);
const controls = new OrbitControls(camera, renderer.domElement);
let root = new THREE.Group();
scene.add(root);

function resize() {
  const w = view.clientWidth, h = view.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h; camera.updateProjectionMatrix();
  const buf = renderer.getDrawingBufferSize(new THREE.Vector2());
  for (const m of [M.faint, M.hiLine, M.fallback]) m.resolution.copy(buf);
}
window.addEventListener('resize', resize);
(function loop() { requestAnimationFrame(loop); controls.update(); renderer.render(scene, camera); })();

// ---- materials ----
const M = {
  faint: new LineMaterial({ color: 0xbbbbbb, linewidth: 2 }),
  hiLine: new LineMaterial({ color: 0x00ffff, linewidth: 5 }),
  fallback: new LineMaterial({ color: 0xff4444, linewidth: 3, dashed: true, dashSize: 0.5, gapSize: 0.3 }),
  pt: new THREE.PointsMaterial({ color: 0x888888, size: 4, sizeAttenuation: false }),
  hiPt: new THREE.PointsMaterial({ color: 0xffcc00, size: 10, sizeAttenuation: false }),
  mesh: new THREE.MeshNormalMaterial({ transparent: true, opacity: 0.4, side: THREE.DoubleSide }),
  hiMesh: new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.6, side: THREE.DoubleSide }),
};
resize(); // now that M exists, size renderer + line-material resolution

// ---- state ----
let GEOM = {};          // id -> geom json
let HLMAP = {};         // node id -> extra render ids to highlight (features/PMI)
let objById = new Map();  // id -> { obj, kind, base, hi, fallback }

function clearScene() {
  scene.remove(root);
  root.traverse(o => { o.geometry?.dispose(); });
  root = new THREE.Group(); scene.add(root);
  objById.clear();
}

function buildObjects(geom) {
  const box = new THREE.Box3();
  for (const [id, g] of Object.entries(geom)) {
    let obj, base, hi;
    if (g.t === 'line') {
      const geo = new LineGeometry();
      geo.setPositions(g.d);
      if (g.fallback) {
        obj = new Line2(geo, M.fallback); obj.computeLineDistances();
        base = M.fallback; hi = M.fallback;
      } else {
        obj = new Line2(geo, M.faint); base = M.faint; hi = M.hiLine;
      }
    } else if (g.t === 'point') {
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.Float32BufferAttribute(g.d, 3));
      obj = new THREE.Points(geo, M.pt); base = M.pt; hi = M.hiPt;
    } else if (g.t === 'mesh') {
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.Float32BufferAttribute(g.d, 3));
      if (g.tri) geo.setIndex(g.tri);
      geo.computeVertexNormals();
      obj = new THREE.Mesh(geo, M.mesh); base = M.mesh; hi = M.hiMesh;
    }
    if (!obj) continue;
    obj.geometry.computeBoundingBox();
    if (obj.geometry.boundingBox) box.union(obj.geometry.boundingBox);
    root.add(obj);
    objById.set(Number(id), { obj, base, hi, fallback: !!g.fallback, type: g.t });
  }
  return box;
}

function fitCamera(box) {
  if (box.isEmpty()) return;
  // Rotate around the AABB centre and frame the box tightly: project all 8
  // corners onto the view axes and pull the camera to the closest distance that
  // still contains every corner (respecting the viewport aspect). This fills the
  // frame far better than a bounding-sphere fit, whose empty corners waste space.
  const c = box.getCenter(new THREE.Vector3());
  controls.target.copy(c);

  const forward = new THREE.Vector3(1, 0.8, 1).normalize();   // target → camera
  const right = new THREE.Vector3().crossVectors(new THREE.Vector3(0, 1, 0), forward).normalize();
  const up = new THREE.Vector3().crossVectors(forward, right).normalize();
  const tanV = Math.tan((camera.fov * Math.PI / 180) / 2);
  const tanH = tanV * camera.aspect;

  const min = box.min, max = box.max;
  let dist = 0;
  for (let i = 0; i < 8; i++) {
    const p = new THREE.Vector3(i & 1 ? max.x : min.x, i & 2 ? max.y : min.y, i & 4 ? max.z : min.z).sub(c);
    const x = p.dot(right), y = p.dot(up), z = p.dot(forward);
    dist = Math.max(dist, z + Math.abs(x) / tanH, z + Math.abs(y) / tanV);
  }
  dist *= 1.05;   // ~5% breathing room

  camera.position.copy(c).add(forward.multiplyScalar(dist));
  const size = box.getSize(new THREE.Vector3()).length() || 1;
  camera.near = size / 100; camera.far = size * 1000; camera.updateProjectionMatrix();
  controls.update();
}

// gather geom ids inside a tree node subtree
function collectIds(node, out) {
  if (objById.has(node.id)) out.add(node.id);
  for (const c of (node.children || [])) collectIds(c, out);
}

function selectNode(node) {
  const ids = new Set(); collectIds(node, ids);
  // Features/PMI reference geometry indirectly; HLMAP lists the render ids to
  // light up (edge lines / vertex points of the referenced faces & edges).
  const hl = HLMAP[node.id] || [];
  hl.forEach(i => ids.add(i));
  const hlSet = new Set(hl);
  for (const [id, rec] of objById) {
    if (rec.fallback) continue;            // fallback keeps its red dashed look
    // Points highlight only when the vertex itself is the selected node or is
    // referenced via HLMAP; selecting a solid/face lights up its edges, not
    // their endpoint points.
    const on = rec.type === 'point' ? (id === node.id || hlSet.has(id)) : ids.has(id);
    rec.obj.material = on ? rec.hi : rec.base;
  }
}

function clearHighlight() {
  for (const [, rec] of objById) {
    if (rec.fallback) continue;
    rec.obj.material = rec.base;
  }
}

// ---- tree build (native <details>/<summary>) ----
// The whole row is the toggle target; a click also drives the 3D highlight.
// Children are built lazily on a <details>'s first open (glitch-free: native
// owns the open/closed state, we only fill once).
function esc(s) {
  return String(s).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
}

let selRow = null;  // selected .row element (sticky single selection)
let selNode = null; // selected node — drives the 3D highlight when not hovering
function selectRow(rowEl, node) {
  if (selRow) selRow.classList.remove('sel');
  selRow = rowEl; rowEl.classList.add('sel');
  selNode = node;
  selectNode(node);
  showDetail(node);
}
function deselect() {
  if (selRow) selRow.classList.remove('sel');
  selRow = null; selNode = null;
  clearHighlight();
  clearDetail();
}
// Hover previews an item's geometry in the 3D view; leaving the tree reverts to
// the selected item (or nothing). Selection (click) and detail are unaffected.
function hoverNode(node) { selectNode(node); }
function unhover() { if (selNode) selectNode(selNode); else clearHighlight(); }

// Build the inner content of a row: [chevron][dot][label #id]. Attributes live
// in the detail pane, not inline, so scene rows stay a single scannable line.
function rowInner(node, { chevron }) {
  const chev = `<span class="chev${chevron ? '' : ' leaf'}"></span>`;
  const emptyGroup = node.kind === 'Group' && !(node.children && node.children.length);
  const id = (node.kind === 'Group' || node.id == null) ? '' : `<span class="idtag">#${node.id}</span>`;
  const none = emptyGroup ? '<span class="none">(none)</span>' : '';
  return `${chev}<div class="node-content"><div class="node-title"><span class="dot"></span><span class="label">${esc(node.label)}</span>${id}${none}</div></div>`;
}

// ---- detail (inspector) pane ----
function detailValueHtml(k, v) {
  // a `color` value like "#c33240" gets a swatch chip before the hex text
  if (k === 'color' && /^#[0-9a-fA-F]{6}$/.test(v)) {
    return `<span class="swatch" style="background:${v}"></span>${esc(v)}`;
  }
  return esc(v);
}
function clearDetail() {
  document.getElementById('detail').innerHTML =
    '<div class="detail-empty">Select an item to see details</div>';
}
function showDetail(node) {
  const el = document.getElementById('detail');
  const kidCount = node.children ? node.children.length : 0;
  const id = (node.kind === 'Group' || node.id == null) ? '' : `<span class="idtag">#${node.id}</span>`;
  let html = `<div class="detail-title"><span class="label">${esc(node.label)}</span>`
    + `<span class="kind">${esc(node.kind)}</span>${id}</div>`;
  if (node.meta && node.meta.length) {
    html += node.meta.map(([k, v]) =>
      `<div class="detail-row"><span class="mk">${esc(k)}</span><span class="mv">${detailValueHtml(k, v)}</span></div>`).join('');
  } else if (node.kind === 'Group') {
    html += `<div class="detail-empty">${kidCount} item${kidCount === 1 ? '' : 's'}</div>`;
  } else {
    html += '<div class="detail-empty">(no attributes)</div>';
  }
  el.innerHTML = html;
}

function rowClass(node) {
  let c = 'row k-' + node.kind;
  if (node.kind === 'Group') {
    c += ' group';
    if (!(node.children && node.children.length)) c += ' empty';
  }
  return c;
}

// Create one tree node element at `depth`. Parents become <details> (filled on
// first open); leaves become a plain clickable row.
function renderNode(node, depth) {
  const pad = `padding-left:${4 + depth * 14}px`;
  const hasKids = node.children && node.children.length;
  if (hasKids) {
    const det = document.createElement('details');
    const sum = document.createElement('summary');
    sum.className = rowClass(node);
    sum.setAttribute('style', pad);
    sum.innerHTML = rowInner(node, { chevron: true });
    det.appendChild(sum);
    let filled = false;
    det.addEventListener('toggle', () => {
      if (det.open && !filled) {
        filled = true;
        for (const c of node.children) det.appendChild(renderNode(c, depth + 1));
      }
    });
    sum.addEventListener('click', () => selectRow(sum, node));
    sum.addEventListener('mouseenter', () => hoverNode(node));
    return det;
  }
  const row = document.createElement('div');
  row.className = rowClass(node);
  row.setAttribute('style', pad);
  row.innerHTML = rowInner(node, { chevron: false });
  if (!(node.kind === 'Group')) {
    row.addEventListener('click', () => selectRow(row, node));
    row.addEventListener('mouseenter', () => hoverNode(node));
  }
  return row;
}

function buildTree(roots) {
  selRow = null; selNode = null;
  const frag = document.createDocumentFragment();
  for (const r of roots) frag.appendChild(renderNode(r, 0));
  return frag;
}

// Leaving the tree area drops the hover preview back to the selection; a click on
// empty sidebar space (not on any row) deselects.
document.getElementById('tree').addEventListener('mouseleave', unhover);
document.getElementById('side-scroll').addEventListener('click', (e) => {
  if (!e.target.closest('.row')) deselect();
});

// ---- report / header panels (same native primitives, read-only) ----
// These are info panels: rows expand/collapse but never select or touch the 3D
// view (no click->selectNode handler; `.info` styling shows a default cursor).
const metaPad = (depth) => `padding-left:${4 + depth * 14}px`;

// A collapsible info section (closed by default). Append children to it.
function infoSection(cls, label, depth) {
  const det = document.createElement('details');
  const sum = document.createElement('summary');
  sum.className = `row info ${cls}`;
  sum.setAttribute('style', metaPad(depth));
  sum.innerHTML = `<span class="chev"></span><div class="node-content"><div class="node-title"><span class="label">${esc(label)}</span></div></div>`;
  det.appendChild(sum);
  return det;
}
function kvRow(k, v, depth) {
  const row = document.createElement('div');
  row.className = 'row info kv';
  row.setAttribute('style', metaPad(depth));
  // An empty value renders as a muted em-dash, so "absent in the file" reads
  // differently from "not shown".
  const mv = v ? `<span class="mv">${esc(v)}</span>` : `<span class="mv empty">—</span>`;
  row.innerHTML = `<span class="chev leaf"></span><div class="node-content"><div class="metaline"><span class="mk">${esc(k)}</span>${mv}</div></div>`;
  return row;
}
function textRow(s, depth) {
  const row = document.createElement('div');
  row.className = 'row info kv';
  row.setAttribute('style', metaPad(depth));
  row.innerHTML = `<span class="chev leaf"></span><div class="node-content"><div class="metaline"><span class="mv">${esc(s)}</span></div></div>`;
  return row;
}
// A nested "title (n)" section listing up to CAP rendered items.
function subSection(title, items, depth, render) {
  const CAP = 500;
  // Empty: a muted, non-expandable row showing "(0)" so the category is always
  // visible (0 vs. hidden reads unambiguously).
  if (!items.length) {
    const row = document.createElement('div');
    row.className = 'row info meta-sub empty';
    row.setAttribute('style', metaPad(depth));
    row.innerHTML = `<span class="chev leaf"></span><div class="node-content"><div class="node-title"><span class="label">${esc(title)} (0)</span></div></div>`;
    return row;
  }
  const sec = infoSection('meta-sub', `${title} (${items.length})`, depth);
  items.slice(0, CAP).forEach(x => sec.appendChild(render(x, depth + 1)));
  if (items.length > CAP) sec.appendChild(textRow(`… ${items.length - CAP} more`, depth + 1));
  return sec;
}

function showReport(r, warnings) {
  const el = document.getElementById('report');
  el.innerHTML = '';
  if (!r) return;
  const drops = r.dropped;
  const root = infoSection('meta-root', 'Report', 0);
  // Provenance counts, one per line. `dropped` is not repeated here — its count
  // shows in the "dropped (N)" section title below.
  root.appendChild(kvRow('input', String(r.n_in), 1));
  root.appendChild(kvRow('kept', String(r.validated), 1));
  root.appendChild(kvRow('synthesized', String(r.n_synth), 1));
  // Always show all three categories (empty ones render as "(0)").
  root.appendChild(subSection('dropped', drops, 1, ([id, why], d) => kvRow('#' + id, why, d)));
  root.appendChild(subSection('normalized', r.norm, 1, (s, d) => textRow(s, d)));
  root.appendChild(subSection('warnings', warnings, 1, (s, d) => textRow(s, d)));
  el.appendChild(root);
}
function showUnits(units) {
  const el = document.getElementById('units');
  el.innerHTML = '';
  if (!units || !units.length) return;
  const root = infoSection('meta-root', 'Units', 0);
  for (const [k, v] of units) root.appendChild(kvRow(k, v, 1));
  el.appendChild(root);
}
function showHeader(h) {
  const el = document.getElementById('header');
  el.innerHTML = '';
  const root = infoSection('meta-root', 'Header', 0);
  // Every header field is always shown — an absent one renders empty (—) so it's
  // clear the file lacks it, rather than the viewer hiding it.
  const add = (k, v) => {
    const val = Array.isArray(v) ? v.join(', ') : (v || '');
    root.appendChild(kvRow(k, val, 1));
  };
  add('file', h.file_name);
  add('schema', h.schema); add('schema(raw)', h.raw_schema);
  add('description', h.description);
  add('author', h.author); add('organization', h.organization); add('timestamp', h.time_stamp);
  add('originating system', h.originating_system);
  add('preprocessor', h.preprocessor); add('authorisation', h.authorisation);
  el.appendChild(root);
}

// ---- load ----
async function loadBytes(bytes) {
  const out = JSON.parse(load_step(bytes));
  showHeader(out.header || {});
  showReport(out.report, out.warnings || []);
  showUnits(out.units || []);
  const tree = document.getElementById('tree');
  tree.innerHTML = '';
  selRow = null; selNode = null; clearDetail(); // drop lingering selection from the last file
  clearScene();
  if (!out.ok) {
    tree.innerHTML = `<pre style="color:#c00">${esc(out.error || 'read failed')}</pre>`;
    return;
  }
  GEOM = out.geom || {};
  HLMAP = out.hl || {};
  const box = buildObjects(GEOM);
  fitCamera(box);
  tree.appendChild(buildTree(out.tree || []));
  document.getElementById('drop').style.display = 'none';
}

// ---- file input + drag/drop (both paths sync the displayed filename) ----
async function loadFile(f) {
  if (!f) return;
  const fn = document.getElementById('fname');
  fn.textContent = f.name;
  fn.title = f.name; // full name on hover, since the display truncates
  loadBytes(new Uint8Array(await f.arrayBuffer()));
}
document.getElementById('openbtn').addEventListener('click', () => document.getElementById('file').click());
document.getElementById('file').addEventListener('change', (e) => loadFile(e.target.files[0]));
const dz = document.getElementById('view');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drop-hi'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drop-hi'));
dz.addEventListener('drop', (e) => {
  e.preventDefault(); dz.classList.remove('drop-hi');
  loadFile(e.dataTransfer.files[0]);
});

// ---- optional auto-open from ?file=<url> ----
// The STEP data is never embedded in this HTML; instead a URL query param points
// at an external file (relative to the page or absolute) that is fetched on load.
// Requires the page to be served over http(s): browsers block fetch under file://.
async function loadUrl(url) {
  const fn = document.getElementById('fname');
  const drop = document.getElementById('drop');
  let name = url;
  try { name = decodeURIComponent(new URL(url, location.href).pathname.split('/').pop()) || url; } catch (_) {}
  fn.textContent = name; fn.title = url;
  drop.textContent = 'Loading …';
  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    await loadBytes(new Uint8Array(await resp.arrayBuffer()));
  } catch (e) {
    fn.textContent = 'No file loaded';
    drop.textContent = 'Drop a STEP file here';
    document.getElementById('tree').innerHTML =
      `<pre style="color:#c00">Could not load ?file= URL:\n${esc(url)}\n${esc(String(e))}</pre>`;
  }
}
const fileParam = new URLSearchParams(location.search).get('file');
if (fileParam) loadUrl(fileParam);
</script>
